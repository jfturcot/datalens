name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy app

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgduckdb/pgduckdb:18-v1.1.1
        env:
          POSTGRES_USER: datalens
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: datalens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datalens -d datalens_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: datalens
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: datalens_test
      DATABASE_URL: postgresql://datalens:testpassword@localhost:5432/datalens_test
      MINIO_ROOT_USER: datalens
      MINIO_ROOT_PASSWORD: testpassword
      MINIO_ENDPOINT: localhost:9000
    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=datalens \
            -e MINIO_ROOT_PASSWORD=testpassword \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then break; fi
            sleep 1
          done

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Check LLM configuration
        id: llm
        env:
          KEY: ${{ secrets.LITELLM_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::notice::LITELLM_API_KEY not configured — skipping e2e tests"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create test .env
        if: steps.llm.outputs.available == 'true'
        run: |
          printf '%s\n' \
            'POSTGRES_USER=datalens' \
            'POSTGRES_PASSWORD=testpassword' \
            'POSTGRES_DB=datalens_test' \
            'POSTGRES_HOST=postgres' \
            'MINIO_ROOT_USER=datalens' \
            'MINIO_ROOT_PASSWORD=testpassword' \
            'MINIO_ENDPOINT=minio:9000' \
            'APP_ENV=test' \
            'SESSION_SECRET=ci-test-secret' \
            "LITELLM_API_KEY=${{ secrets.LITELLM_API_KEY }}" \
            "LITELLM_API_URL=${{ secrets.LITELLM_API_URL }}" \
            "LITELLM_MODEL=${LITELLM_MODEL:-claude-sonnet-4-5}" \
            > .env

      - name: Start services
        if: steps.llm.outputs.available == 'true'
        run: docker compose -f docker-compose.test.yml up -d --build --wait

      - uses: actions/setup-node@v4
        if: steps.llm.outputs.available == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        if: steps.llm.outputs.available == 'true'
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.llm.outputs.available == 'true'
        working-directory: e2e
        run: npx playwright test
        env:
          CI: true

      - name: Upload test screenshots on failure
        if: failure() && steps.llm.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 7

      - name: Stop services
        if: always() && steps.llm.outputs.available == 'true'
        run: docker compose -f docker-compose.test.yml down -v
